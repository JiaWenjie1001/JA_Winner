<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
  <head>
    <title></title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <script type="text/javascript" src="../internal.js"></script>
    <link rel="stylesheet" type="text/css" href="../../themes/notadd/css/custom.css" />
  </head>
  <body class="linkDialogPage">
    <table class="linkDialogTable">
      <tr class="linkDialogRow linkDialogRowText">
        <td class="linkDialogCell">
          <label for="text" class="linkDialogLabel"><var id="lang_input_text"></var></label>
        </td>
        <td class="linkDialogCell">
          <input
            class="linkDialogInput"
            id="text"
            type="text"
            disabled="true"
            placeholder="请输入链接文本"
          />
        </td>
      </tr>
      <tr class="linkDialogRow">
        <td class="linkDialogCell">
          <label for="href" class="linkDialogLabel"><var id="lang_input_url"></var></label>
        </td>
        <td class="linkDialogCell">
          <input
            class="linkDialogInput"
            id="href"
            type="text"
            placeholder="请输入链接地址，以http://、https://开头"
          />
        </td>
      </tr>
    </table>
    <script type="text/javascript">
      editor.setOpt('allowLinkProtocols', [
        'http:',
        'https:',
        '#',
        '/',
        'ftp:',
        'mailto:',
        'tel:'
      ])
      var allowLinkProtocols = editor.getOpt('allowLinkProtocols')

      var range = editor.selection.getRange(),
        link = range.collapsed
          ? editor.queryCommandValue('link')
          : editor.selection.getStart(),
        url,
        text = $G('text'),
        rangeLink = domUtils.findParentByTagName(
          range.getCommonAncestor(),
          'a',
          true
        ),
        orgText

      link = domUtils.findParentByTagName(link, 'a', true)

      if (link) {
        url = utils.html(
          link.getAttribute('_href') || link.getAttribute('href', 2)
        )

        if (rangeLink === link && !link.getElementsByTagName('img').length) {
          text.removeAttribute('disabled')
          orgText = text.value = link[browser.ie ? 'innerText' : 'textContent']
        } else {
          text.setAttribute('disabled', 'true')
          text.value = lang.validLink
        }
      } else {
        if (range.collapsed) {
          text.removeAttribute('disabled')
          text.value = ''
        } else {
          text.setAttribute('disabled', 'true')
          text.value = lang.validLink
        }
      }
      $G('href').value = url ? url : ''
      $focus($G('href'))

      function handleDialogOk() {
        var href = $G('href').value.replace(/^\s+|\s+$/g, '')
        if (href) {
          if (!hrefStartWith(href, allowLinkProtocols)) {
            href = 'http://' + href
          }
          var obj = {
            href: href,
            _href: href
          }
          //修改链接内容的情况太特殊了，所以先做到这里了
          //todo:情况多的时候，做到command里
          if (orgText && text.value != orgText) {
            link[browser.ie ? 'innerText' : 'textContent'] = obj.textValue =
              text.value
            range.selectNode(link).select()
          }
          if (range.collapsed) {
            obj.textValue = text.value
          }
          editor.execCommand('link', utils.clearEmptyAttrs(obj))
          dialog.close()
        }
      }
      dialog.onok = handleDialogOk

      function hrefStartWith(href, arr) {
        href = href.replace(/^\s+|\s+$/g, '')
        for (var i = 0, ai; (ai = arr[i++]); ) {
          if (href.indexOf(ai) == 0) {
            return true
          }
        }
        return false
      }
    </script>
  </body>
</html>
